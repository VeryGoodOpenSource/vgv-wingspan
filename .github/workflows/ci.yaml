name: ci

on:
  pull_request:
    branches:
      - main

jobs:
  markdown:
    name: 📝 Markdown Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'
          config: 'config/custom.markdownlint.jsonc'
  spelling:
    name: ✍️ Spelling Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Spell Check Code
        uses: streetsidesoftware/cspell-action@v6
        with:
          files: '**/*.md'
          config: 'config/cspell.json'
  discover-skills:
    name: 🔎 Discover Skills
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Discover skill directories
        id: discover
        run: |
          skills=$(find ./skills -maxdepth 1 -mindepth 1 -type d -exec basename {} \; | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=$skills" >> "$GITHUB_OUTPUT"
  validate-skills:
    name: 🔍 Validate Skills
    needs: discover-skills
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJson(needs.discover-skills.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate ${{ matrix.skill }}
        uses: Flash-Brew-Digital/validate-skill@v1
        with:
          path: ./skills/${{ matrix.skill }}
          validate-references: 'true'